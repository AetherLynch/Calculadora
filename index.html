<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
<link rel="stylesheet" href="static/style.css">
</head>

<body>

<div class="container">

    <h1>Calculadora</h1>

    <div class="calculator">

        <input type="number" id="num1" placeholder="Número 1">
        <input type="number" id="num2" placeholder="Número 2">

        <div class="buttons">
            <button onclick="calculate('add')">+</button>
            <button onclick="calculate('sub')">-</button>
            <button onclick="calculate('mul')">*</button>
            <button onclick="calculate('div')">/</button>
        </div>

        <div class="result">
            Resultado: <span id="result">0</span>
        </div>

    </div>

</div>

<script>

function calculate(operation){

    let n1 = parseFloat(document.getElementById("num1").value);
    let n2 = parseFloat(document.getElementById("num2").value);

    let result = 0;

    if(operation === "add") result = n1 + n2;
    if(operation === "sub") result = n1 - n2;
    if(operation === "mul") result = n1 * n2;
    if(operation === "div") result = n1 / n2;

    document.getElementById("result").innerText = result;
}

</script>

</body>
</html>
